<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camisa100</title>
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <header class="top">
    <div class="brand">CAMISA<span>100</span></div>
    <button class="sound-toggle" id="soundToggle" type="button" aria-label="Desativar som" aria-pressed="false" title="Som">
      <svg class="icon-sound-on" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" fill="currentColor">
        <path d="M4 9v6h3.6l4.9 4V5l-4.9 4H4Z"/>
        <path d="M16 8.5a5 5 0 0 1 0 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M18.6 6a9 9 0 0 1 0 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <svg class="icon-sound-off" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" fill="currentColor">
        <path d="M4 9v6h3.6l4.9 4V5l-4.9 4H4Z"/>
        <path d="M16 9l5.5 5.5M21.5 9 16 14.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </header>

  <main class="board">

    <section class="panel jersey-panel">
      <div class="score-bar" id="scoreBar">
        <svg class="score-icon" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
          <path d="M6 3h12v3.5a5 5 0 0 1-4 4.9V14a2 2 0 0 0 2 2h1v2H7v-2h1a2 2 0 0 0 2-2v-2.6a5 5 0 0 1-4-4.9V3Z"/>
          <path d="M6 4H3v1a4 4 0 0 0 3.6 4" fill="none" stroke-width="1.6"/>
          <path d="M18 4h3v1a4 4 0 0 1-3.6 4" fill="none" stroke-width="1.6"/>
          <rect x="8" y="19" width="8" height="2" rx="1"/>
        </svg>
        <span class="score-label">Pontuação total</span>
        <strong id="totalScore">0</strong>
        <span class="score-float" id="scoreFloat"></span>
      </div>
      <div class="jersey-mid">
        <div class="ring-wrap" id="jerseyBtn" role="button" tabindex="0" aria-label="Girar para o próximo jogador">
          <svg viewBox="0 0 220 220" width="220" height="220">
            <circle class="ring-track" cx="110" cy="110" r="98"></circle>
            <circle class="ring-value" id="ringValue" cx="110" cy="110" r="98" stroke-dasharray="615.75" stroke-dashoffset="0"></circle>
          </svg>
          <div class="jersey-viewport">
            <div class="jersey-track" id="jerseyTrack"></div>
          </div>
          <div class="spin-hint" id="spinHint">Toque na camisa para o próximo jogador</div>
        </div>
        <div class="points-remaining" id="pointsRemaining">Rodada vale <b id="pointsValue">100</b> pontos<span class="points-float" id="pointsFloat"></span></div>
      </div>
    </section>

    <div>
      <section class="panel clues-panel">
        <h2>Pistas reveladas</h2>
        <ul id="cluesList"></ul>
        <button class="btn btn-gold" id="hintBtn">Dica <span class="hint-cost" id="hintCost">grátis</span></button>
      </section>

      <section class="panel guess-panel">
        <h2>Quem é o jogador?</h2>
        <div class="guess-row">
          <input id="guessInput" type="text" list="playersList" placeholder="Digite o nome do jogador..." autocomplete="off">
          <datalist id="playersList"></datalist>
        </div>
        <div class="action-row">
          <button class="btn btn-good" id="guessBtn">Chutar</button>
          <button class="btn btn-ghost" id="revealBtn">Revelar resposta</button>
        </div>
        <div id="feedback" class="info"></div>
      </section>
    </div>

  </main>

</div>

<div class="hint-overlay" id="hintOverlay">
  <div class="hint-overlay-inner">
    <div class="hint-overlay-title">Escolha uma carta</div>
    <div class="hint-cards" id="hintCards"></div>
  </div>
</div>

<div class="answer-overlay" id="answerOverlay">
  <div class="answer-overlay-inner">
    <div class="answer-card" id="answerCard"></div>
    <button class="btn btn-ghost answer-close" id="answerCloseBtn">Fechar</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
